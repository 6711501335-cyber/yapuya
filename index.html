<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแฟ้มผลงานออนไลน์</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>My Online Portfolio</h1>
    </header>

    <main>
        <section class="form-section">
            <h2>เพิ่มผลงานใหม่</h2>
            <form id="portfolio-form">
                <input type="text" id="title" placeholder="ชื่อผลงาน" required>
                <textarea id="description" rows="4" placeholder="รายละเอียดผลงาน" required></textarea>
                <input type="url" id="link" placeholder="ลิงก์ผลงาน (ถ้ามี)">
                <button type="submit">บันทึกผลงาน</button>
            </form>
        </section>

        <section class="portfolio-list-section">
            <h2>ผลงานทั้งหมด</h2>
            <div id="portfolio-container">
                </div>
        </section>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
