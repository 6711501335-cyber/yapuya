<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแฟ้มผลงานออนไลน์ | My Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4F46E5; 
            --primary-hover: #4338CA;
            --danger-color: #EF4444;
            --danger-hover: #DC2626;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; }

        header { background-color: var(--primary-color); color: white; padding: 3rem 1rem; text-align: center; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); margin-bottom: 2rem; position: relative; }
        header h1 { font-weight: 600; font-size: 2.5rem; margin-bottom: 0.5rem; }
        header p { font-weight: 300; font-size: 1.1rem; opacity: 0.9; }
        
        #logout-btn { position: absolute; top: 1rem; right: 1rem; background: rgba(255,255,255,0.2); color: white; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-family: 'Kanit'; font-weight: 500; display: none; }
        #logout-btn:hover { background: rgba(255,255,255,0.3); }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 1rem; flex-grow: 1; width: 100%; }

        .form-container { background: var(--card-bg); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); margin-bottom: 3rem; border-top: 4px solid var(--primary-color); }
        .form-container h2 { margin-bottom: 1.5rem; color: var(--primary-color); border-bottom: 2px solid #E5E7EB; padding-bottom: 0.5rem; }
        
        .input-group { margin-bottom: 1rem; }
        .input-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.95rem; }
        input, textarea { width: 100%; padding: 0.75rem 1rem; border: 1px solid #D1D5DB; border-radius: 8px; font-family: 'Kanit', sans-serif; font-size: 1rem; }
        input:focus, textarea:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2); }
        
        button[type="submit"] { background-color: var(--primary-color); color: white; border: none; padding: 0.75rem 1.5rem; font-size: 1rem; font-weight: 500; border-radius: 8px; cursor: pointer; width: 100%; transition: 0.2s; font-family: 'Kanit', sans-serif; margin-top: 1rem;}
        button[type="submit"]:hover:not(:disabled) { background-color: var(--primary-hover); }
        button:disabled { background-color: #9CA3AF; cursor: not-allowed; }

        .portfolio-header { margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        #portfolio-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; padding-bottom: 3rem; }

        .card { background: var(--card-bg); border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border-top: 4px solid var(--primary-color); transition: transform 0.2s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .card h3 { font-size: 1.25rem; margin-bottom: 0.5rem; color: var(--text-main); }
        .card p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; flex-grow: 1; margin-bottom: 1.25rem; }
        
        .card-actions { display: flex; gap: 0.5rem; margin-top: auto; }
        .btn-link { flex: 1; text-align: center; background-color: #F3F4F6; color: var(--primary-color); text-decoration: none; padding: 0.5rem; border-radius: 6px; font-weight: 500; font-size: 0.9rem; transition: 0.2s; }
        .btn-link:hover { background-color: #E5E7EB; }
        .btn-delete { background-color: white; color: var(--danger-color); border: 1px solid var(--danger-color); padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-family: 'Kanit'; font-weight: 500; transition: 0.2s; display: none; }
        .btn-delete:hover { background-color: var(--danger-color); color: white; }
        
        #loading { text-align: center; color: var(--text-muted); grid-column: 1 / -1; padding: 2rem; }

        .hidden { display: none !important; }

        /* ส่วนท้ายเว็บ (Footer) สำหรับซ่อนปุ่มแอดมิน */
        footer { text-align: center; padding: 2rem; margin-top: auto; color: var(--text-muted); font-size: 0.9rem; }
        #secret-login-btn { background: none; border: none; color: inherit; cursor: pointer; text-decoration: underline; font-family: 'Kanit'; }
        #secret-login-btn:hover { color: var(--primary-color); }
    </style>
</head>
<body>

    <header>
        <h1>แฟ้มผลงานของฉัน</h1>
        <p>ยินดีต้อนรับสู่พื้นที่รวบรวมผลงานและโปรเจกต์ต่างๆ</p>
        <button id="logout-btn">ออกจากระบบ</button>
    </header>

    <div class="container">
        
        <div id="login-section" class="form-container hidden">
            <h2>🔒 เข้าสู่ระบบผู้ดูแล</h2>
            <form id="login-form">
                <div class="input-group">
                    <label>อีเมล</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="input-group">
                    <label>รหัสผ่าน</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" id="login-submit-btn">เข้าสู่ระบบ</button>
            </form>
        </div>

        <div id="admin-section" class="form-container hidden">
            <h2>✨ เพิ่มผลงานใหม่</h2>
            <form id="portfolio-form">
                <div class="input-group">
                    <label for="title">ชื่อผลงาน *</label>
                    <input type="text" id="title" required>
                </div>
                <div class="input-group">
                    <label for="description">รายละเอียดผลงาน *</label>
                    <textarea id="description" rows="3" required></textarea>
                </div>
                <div class="input-group">
                    <label for="link">ลิงก์ผลงาน (URL)</label>
                    <input type="url" id="link" placeholder="https://...">
                </div>
                <button type="submit" id="submit-btn">บันทึกผลงานลงระบบ</button>
            </form>
        </div>

        <div class="portfolio-header">
            <h2>📚 ผลงานทั้งหมด</h2>
        </div>
        <div id="portfolio-container">
            <p id="loading">กำลังโหลดข้อมูล...</p>
        </div>
    </div>

    <footer>
        <p>© 2026 My Portfolio | <button id="secret-login-btn">สำหรับผู้ดูแลระบบ</button></p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHsow_1xhst-NG4M0TX5nt2bXfxJ0LhQg",
            authDomain: "yapuyaapp.firebaseapp.com",
            projectId: "yapuyaapp",
            storageBucket: "yapuyaapp.firebasestorage.app",
            messagingSenderId: "861406844734",
            appId: "1:861406844734:web:adcc9f9d8890f3f440fe6f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const colRef = collection(db, 'portfolios');

        const loginSection = document.getElementById('login-section');
        const adminSection = document.getElementById('admin-section');
        const logoutBtn = document.getElementById('logout-btn');
        const secretLoginBtn = document.getElementById('secret-login-btn');
        let isLoggedIn = false; 

        // จัดการปุ่มลับด้านล่าง เพื่อเปิด/ปิด ฟอร์มล็อกอิน
        secretLoginBtn.addEventListener('click', () => {
            if (!isLoggedIn) {
                loginSection.classList.toggle('hidden');
                // เลื่อนหน้าจอขึ้นไปหาฟอร์มล็อกอิน
                if (!loginSection.classList.contains('hidden')) {
                    loginSection.scrollIntoView({ behavior: 'smooth' });
                }
            }
        });

        // ตรวจสอบสถานะการล็อกอิน
        onAuthStateChanged(auth, (user) => {
            if (user) {
                isLoggedIn = true;
                loginSection.classList.add('hidden');
                adminSection.classList.remove('hidden');
                logoutBtn.style.display = 'block';
                secretLoginBtn.style.display = 'none'; // ซ่อนปุ่มลับเมื่อล็อกอินแล้ว
            } else {
                isLoggedIn = false;
                loginSection.classList.add('hidden'); // ซ่อนฟอร์มล็อกอินเป็นค่าเริ่มต้น
                adminSection.classList.add('hidden');
                logoutBtn.style.display = 'none';
                secretLoginBtn.style.display = 'inline';
            }
            renderPortfolios(); 
        });

        // จัดการการล็อกอิน
        const loginForm = document.getElementById('login-form');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('login-submit-btn');
            
            btn.textContent = 'กำลังตรวจสอบ...';
            try {
                await signInWithEmailAndPassword(auth, email, password);
                loginForm.reset();
            } catch (error) {
                alert('อีเมลหรือรหัสผ่านไม่ถูกต้อง!');
                console.error(error);
            } finally {
                btn.textContent = 'เข้าสู่ระบบ';
            }
        });

        // จัดการการออกจากระบบ
        logoutBtn.addEventListener('click', () => {
            signOut(auth).then(() => {
                alert('ออกจากระบบเรียบร้อยแล้ว');
            });
        });

        // จัดการฟอร์มเพิ่มผลงาน
        const portfolioForm = document.getElementById('portfolio-form');
        portfolioForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.textContent = 'กำลังบันทึกข้อมูล...';
            btn.disabled = true;

            try {
                await addDoc(colRef, {
                    title: document.getElementById('title').value,
                    description: document.getElementById('description').value,
                    link: document.getElementById('link').value,
                    createdAt: serverTimestamp()
                });
                portfolioForm.reset();
                alert('🎉 บันทึกผลงานเรียบร้อยแล้ว!');
            } catch (error) {
                console.error("Error: ", error);
                alert('เกิดข้อผิดพลาดในการบันทึก');
            } finally {
                btn.textContent = 'บันทึกผลงานลงระบบ';
                btn.disabled = false;
            }
        });

        window.deletePortfolio = async (id) => {
            if(confirm('คุณแน่ใจหรือไม่ว่าต้องการลบผลงานชิ้นนี้?')) {
                try {
                    await deleteDoc(doc(db, 'portfolios', id));
                } catch (error) {
                    console.error("Error deleting document: ", error);
                    alert("ไม่สามารถลบได้");
                }
            }
        };

        let portfoliosData = [];
        const container = document.getElementById('portfolio-container');
        const q = query(colRef, orderBy('createdAt', 'desc'));

        onSnapshot(q, (snapshot) => {
            portfoliosData = [];
            snapshot.forEach(document => {
                portfoliosData.push({ id: document.id, ...document.data() });
            });
            renderPortfolios();
        });

        function renderPortfolios() {
            if (portfoliosData.length === 0) {
                container.innerHTML = '<p id="loading">ยังไม่มีข้อมูลผลงานในระบบ</p>';
                return;
            }

            let html = '';
            portfoliosData.forEach(data => {
                const deleteBtnHtml = isLoggedIn 
                    ? `<button onclick="deletePortfolio('${data.id}')" class="btn-delete" style="display:block;">ลบ</button>` 
                    : '';

                html += `
                    <div class="card">
                        <h3>${data.title}</h3>
                        <p>${data.description}</p>
                        <div class="card-actions">
                            ${data.link ? `<a href="${data.link}" target="_blank" class="btn-link">🔗 ไปยังผลงาน</a>` : ''}
                            ${deleteBtnHtml}
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
    </script>
</body>
</html>
