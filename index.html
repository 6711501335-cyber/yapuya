<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแฟ้มผลงานออนไลน์ | My Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- การตั้งค่าสีและฟอนต์ --- */
        :root {
            --primary-color: #4F46E5; /* สีน้ำเงินม่วงทันสมัย */
            --primary-hover: #4338CA;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg-color); color: var(--text-main); }

        /* --- ส่วนหัวเว็บ (Header) --- */
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }
        header h1 { font-weight: 600; font-size: 2rem; }
        header p { font-weight: 300; margin-top: 0.5rem; opacity: 0.9; }

        /* --- โครงสร้างหลัก --- */
        .container { max-width: 1000px; margin: 0 auto; padding: 0 1rem; }

        /* --- ฟอร์มเพิ่มข้อมูล --- */
        .form-container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 3rem;
        }
        .form-container h2 { margin-bottom: 1.5rem; color: var(--primary-color); border-bottom: 2px solid #E5E7EB; padding-bottom: 0.5rem; }
        .input-group { margin-bottom: 1rem; }
        .input-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.95rem; }
        input, textarea {
            width: 100%; padding: 0.75rem 1rem;
            border: 1px solid #D1D5DB; border-radius: 8px;
            font-family: 'Kanit', sans-serif; font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus, textarea:focus {
            outline: none; border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }
        button[type="submit"] {
            background-color: var(--primary-color); color: white;
            border: none; padding: 0.75rem 1.5rem; font-size: 1rem; font-weight: 500;
            border-radius: 8px; cursor: pointer; width: 100%;
            transition: background-color 0.2s; font-family: 'Kanit', sans-serif;
        }
        button[type="submit"]:hover { background-color: var(--primary-hover); }

        /* --- ส่วนแสดงผลงาน (Grid) --- */
        .portfolio-header { margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        #portfolio-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            padding-bottom: 3rem;
        }

        /* --- การ์ดผลงาน --- */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border-top: 4px solid var(--primary-color);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .card h3 { font-size: 1.25rem; margin-bottom: 0.5rem; color: var(--text-main); }
        .card p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; flex-grow: 1; margin-bottom: 1.25rem; }
        .card-link {
            display: inline-block; text-align: center;
            background-color: #F3F4F6; color: var(--primary-color);
            text-decoration: none; padding: 0.5rem 1rem;
            border-radius: 6px; font-weight: 500; font-size: 0.9rem;
            transition: background-color 0.2s;
        }
        .card-link:hover { background-color: #E5E7EB; }
        
        /* Loading Text */
        #loading { text-align: center; color: var(--text-muted); grid-column: 1 / -1; }
    </style>
</head>
<body>

    <header>
        <h1>ระบบแฟ้มผลงานออนไลน์</h1>
        <p>บันทึกและจัดการพอร์ตโฟลิโอของคุณได้อย่างง่ายดาย</p>
    </header>

    <div class="container">
        <div class="form-container">
            <h2>✨ เพิ่มผลงานใหม่</h2>
            <form id="portfolio-form">
                <div class="input-group">
                    <label for="title">ชื่อผลงาน</label>
                    <input type="text" id="title" placeholder="เช่น ระบบจัดการร้านค้า, แอพคำนวณรายรับรายจ่าย" required>
                </div>
                <div class="input-group">
                    <label for="description">รายละเอียดผลงาน</label>
                    <textarea id="description" rows="4" placeholder="อธิบายจุดเด่นหรือเทคโนโลยีที่ใช้ในผลงานชิ้นนี้" required></textarea>
                </div>
                <div class="input-group">
                    <label for="link">ลิงก์ผลงาน (URL)</label>
                    <input type="url" id="link" placeholder="https://...">
                </div>
                <button type="submit" id="submit-btn">บันทึกผลงานลงระบบ</button>
            </form>
        </div>

        <div class="portfolio-header">
            <h2>📚 ผลงานทั้งหมดของคุณ</h2>
        </div>
        <div id="portfolio-container">
            <p id="loading">กำลังโหลดข้อมูล...</p>
        </div>
    </div>

    <script type="module">
        // 1. นำเข้า Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query, orderBy } 
        from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 2. ข้อมูลการเชื่อมต่อของคุณ (จากที่ให้มา)
        const firebaseConfig = {
            apiKey: "AIzaSyBHsow_1xhst-NG4M0TX5nt2bXfxJ0LhQg",
            authDomain: "yapuyaapp.firebaseapp.com",
            projectId: "yapuyaapp",
            storageBucket: "yapuyaapp.firebasestorage.app",
            messagingSenderId: "861406844734",
            appId: "1:861406844734:web:adcc9f9d8890f3f440fe6f"
        };

        // 3. เริ่มต้นระบบ Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, 'portfolios');

        // 4. จัดการฟอร์มบันทึกข้อมูล
        const form = document.getElementById('portfolio-form');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.textContent = 'กำลังบันทึก...';
            submitBtn.disabled = true;

            try {
                await addDoc(colRef, {
                    title: document.getElementById('title').value,
                    description: document.getElementById('description').value,
                    link: document.getElementById('link').value,
                    createdAt: serverTimestamp()
                });
                form.reset();
                alert('🎉 บันทึกผลงานเรียบร้อยแล้ว!');
            } catch (error) {
                console.error("Error adding document: ", error);
                alert('เกิดข้อผิดพลาดในการบันทึก กรุณาตรวจสอบสิทธิ์ Firestore (Rules)');
            } finally {
                submitBtn.textContent = 'บันทึกผลงานลงระบบ';
                submitBtn.disabled = false;
            }
        });

        // 5. ดึงข้อมูลมาแสดงผลแบบ Real-time
        const container = document.getElementById('portfolio-container');
        const q = query(colRef, orderBy('createdAt', 'desc')); // เรียงจากใหม่ไปเก่า

        onSnapshot(q, (snapshot) => {
            if (snapshot.empty) {
                container.innerHTML = '<p id="loading">ยังไม่มีข้อมูลผลงานในระบบ ลองเพิ่มผลงานแรกของคุณดูสิ!</p>';
                return;
            }

            let html = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                html += `
                    <div class="card">
                        <h3>${data.title}</h3>
                        <p>${data.description}</p>
                        ${data.link ? `<a href="${data.link}" target="_blank" class="card-link">🔗 ไปยังผลงาน</a>` : ''}
                    </div>
                `;
            });
            container.innerHTML = html;
        }, (error) => {
            console.error("Error fetching data: ", error);
            container.innerHTML = '<p id="loading" style="color: red;">เกิดข้อผิดพลาดในการดึงข้อมูล โปรดตรวจสอบ Firestore Rules</p>';
        });
    </script>
</body>
</html>
