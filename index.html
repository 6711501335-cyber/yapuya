<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแจ้งเตือนการทานยา</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="icon-header">💊</div>
            <h1>บันทึกการทานยา</h1>
            <p>ระบบช่วยจำ จัดการยาของคุณ</p>
        </header>
        
        <main>
            <div class="card form-card">
                <h2>เพิ่มรายการยาใหม่</h2>
                <form id="medication-form">
                    <div class="form-group">
                        <label for="medName">ชื่อยา / สรรพคุณ</label>
                        <input type="text" id="medName" placeholder="เช่น ยาลดความดัน (เม็ดสีเหลือง)" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="medDose">ขนาดรับประทาน</label>
                        <input type="text" id="medDose" placeholder="เช่น 1 เม็ด หลังอาหารเช้า" required>
                    </div>

                    <div class="form-group">
                        <label for="medTime">เวลาที่ต้องทาน</label>
                        <input type="time" id="medTime" required>
                    </div>

                    <button type="submit" class="btn-submit">
                        <span>➕</span> บันทึกข้อมูลยา
                    </button>
                </form>
            </div>

            <div class="list-section">
                <h2>รายการยาที่ต้องทานวันนี้</h2>
                <div id="medication-list">
                    </div>
            </div>
        </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
