<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>พยากรณ์อากาศ</h1>
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="ใส่ชื่อเมือง (ภาษาอังกฤษ)...">
            <button id="searchBtn">ค้นหา</button>
        </div>

        <div id="weatherResult" class="weather-card" style="display: none;">
            <h2 id="cityName">---</h2>
            <p id="description">---</p>
            <div class="temp-container">
                <span id="temp">0</span>°C
            </div>
            <p>ความชื้น: <span id="humidity">0</span>%</p>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
