<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแจ้งเตือนการทานยา</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>💊 บันทึกการทานยา</h1>
        
        <form id="medication-form">
            <div class="form-group">
                <label for="medName">ชื่อยา / สรรพคุณ</label>
                <input type="text" id="medName" placeholder="เช่น ยาลดความดัน" required>
            </div>
            
            <div class="form-group">
                <label for="medDose">ขนาดรับประทาน</label>
                <input type="text" id="medDose" placeholder="เช่น 1 เม็ด หลังอาหารเช้า" required>
            </div>

            <div class="form-group">
                <label for="medTime">เวลาที่ต้องทาน</label>
                <input type="time" id="medTime" required>
            </div>

            <button type="submit" class="btn-submit">บันทึกข้อมูลยา</button>
        </form>

        <hr>

        <h2>รายการยาที่ต้องทาน</h2>
        <div id="medication-list">
            </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
